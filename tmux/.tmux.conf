setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"


# Renumber windows
set -g renumber-windows off

# Automaitcally rename.
setw -g automatic-rename

# Allows for faster key repetition
set -s escape-time 0

# Scroll History
set -g history-limit 30000

# Mouse
set -g mouse on
set-option -s set-clipboard on
# Mouse-drag copy handled by tmux-yank (auto-detects mac/linux/wsl).
bind-key b set-option status

set-option -g default-shell /bin/zsh
set -g @shell_mode 'vi'  # tmux-yank option.
set -g @yank_selection 'primary'  # tmux-yank option.

# ----------
# Theme

# Power
set -g @plugin 'wfxr/tmux-power'
set -g @tmux_power_theme '#a89984'

# Tokyo night theme
# set -g @plugin 'fabioluciano/tmux-tokyo-night'
# set -g @theme_enable_icons 1
# set -g @theme_left_separator ' ' #
# set -g @theme_right_separator ' ' #
# set -g @theme_window_with_activity_style


# Nerd font window name
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'


set -g @tpm_plugins '
	tmux-plugins/tpm
	tmux-plugins/tmux-sensible
	nhdaly/tmux-scroll-copy-mode
	tmux-plugins/tmux-yank
	tmux-plugins/tmux-resurrect
	tmux-plugins/tmux-continuum
'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
set-environment -g PATH "/opt/homebrew/bin:$HOME/.local/bin:/usr/local/bin:/bin:/usr/bin"
run '~/.tmux/plugins/tpm/tpm'
