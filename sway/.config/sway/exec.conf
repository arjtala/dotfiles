#-----------#
# Autostart #
#-----------#
# systemd user graphical session: brings up xdg-desktop-portal (dark mode / screen-share /
# file pickers) and imports WAYLAND_DISPLAY+SWAYSOCK into the systemd/D-Bus environment.
exec /usr/libexec/sway-systemd/session.sh
exec "/usr/libexec/polkit-mate-authentication-agent-1"
# exec "/usr/libexec/polkit-gnome-authentication-agent-1"
# xdg-desktop-portal[-gtk] are D-Bus/systemd-activated; manual launch races the activation mechanism
exec dbus-update-activation-environment --all
exec dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway
# exec systemctl --user import-environment DISPLAY WAYLAND_DISPLAY SWAYSOCK

# mako is the notification daemon (owns org.freedesktop.Notifications).
# Scripts post notifications via notify-send (libnotify).
exec mako
# exec_always pkill swaync && swaync
# night-light (constant 4500K; swap for `gammastep -l LAT:LON` to get automatic day/night)
exec gammastep -O 4500
exec  --no-startup-id  fcitx5 &
exec  --no-startup-id  nm-applet --indicator &
# exec_always  --no-startup-id  xwaylandvideobridge
# Clipman is not good, install Clipse or Cliphist
exec wl-paste -p -t text --watch clipman store -P --histpath="$HOME/.local/share/clipman-primary.json"
exec wl-paste -t text --watch clipman store
# exec_always  ~/.local/bin/clipse -listen

#---------#
# Scripts #
#---------#
exec $sway_scripts/autotiling
exec $sway_scripts/idle_script on
