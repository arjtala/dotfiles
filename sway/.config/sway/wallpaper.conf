# Scaling for the LEN T32p-20 4K panel (-> effective 2560x1440). Same monitor on both
# machines but on different connectors (this box: DP-1, the other: HDMI-A-1); each line is a
# harmless no-op on the machine where that connector isn't in use.
output DP-1 scale 1.5
output HDMI-A-1 scale 1.5
