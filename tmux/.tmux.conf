setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"


# Renumber windows
set -g renumber-windows off

# Automaitcally rename.
setw -g automatic-rename

# Allows for faster key repetition
set -s escape-time 0

# Scroll History
set -g history-limit 30000

# Mouse
set -g mouse on
set-option -s set-clipboard on
# Mouse-drag copy handled by tmux-yank (auto-detects mac/linux/wsl).
bind-key b set-option status

set-option -g default-shell /bin/zsh
set -g @shell_mode 'vi'  # tmux-yank option.
set -g @yank_selection 'primary'  # tmux-yank option.

# ----------
# Theme — chosen conditionally after TPM loads (see bottom of file).
# Both plugins live as submodules under ~/.tmux/plugins and are sourced
# directly (not via `set -g @plugin`) so TPM doesn't auto-load either one
# and the conditional can pick exactly one.

# Nerd font window name
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

# ----------
# Productivity plugins

# fzf picker over URLs visible in the pane (prefix + u)
set -g @plugin 'wfxr/tmux-fzf-url'

# Vimium-style on-screen copy hints (prefix + F)
# Written in Rust; TPM runs `cargo build` on first install.
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key F

# fzf-driven scrollback search (prefix + /)
# Default key is `?` which would shadow tmux's list-keys.
set -g @plugin 'roosta/tmux-fuzzback'
set -g @fuzzback-bind '/'

# Auto-reload tmux.conf on save (needs `entr` in PATH: brew install entr)
set -g @plugin 'b0o/tmux-autoreload'


set -g @tpm_plugins '
	tmux-plugins/tpm
	tmux-plugins/tmux-sensible
	nhdaly/tmux-scroll-copy-mode
	tmux-plugins/tmux-yank
	tmux-plugins/tmux-resurrect
	tmux-plugins/tmux-continuum
'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
set-environment -g PATH "/opt/homebrew/bin:$HOME/.local/bin:/usr/local/bin:/bin:/usr/bin"
run '~/.tmux/plugins/tpm/tpm'

# Theme selection:
#   - local (no SSH_CONNECTION): oasis (flavor below) + matching Ghostty theme,
#     both generated by scripts/oasis-theme
#   - remote (SSH'd in):         tmux-power, safer against unknown terminal bg
# Must come AFTER tpm so the plugins' own options exist.
if-shell '[ -n "$SSH_CONNECTION" ]' {
  set -g @tmux_power_theme '#a89984'
  run '~/.tmux/plugins/tmux-power/tmux-power.tmux'
} {
  set -g @oasis_flavor 'canyon_dark'
  run '~/.tmux/plugins/tmux-oasis/oasis.tmux'
  # Re-sync legacy status-bg/fg to oasis palette (see prior commit for why).
  set -Fg status-bg '#{@thm_mantle}'
  set -Fg status-fg '#{@thm_secondary}'
}
