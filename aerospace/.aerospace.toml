# AeroSpace config — matched to sway/i3 keybindings
# i3/sway $super → alt (macOS reserves Cmd for system/app shortcuts)

start-at-login = true

# Notify SketchyBar on workspace change
after-startup-command = ['exec-and-forget sketchybar']
exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
]

# i3-like normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout defaults
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Matches sway: focus_follows_mouse yes
on-focus-changed = ['move-mouse window-lazy-center']

# Matches sway: gaps inner 5, outer 3
[gaps]
inner.horizontal = 5
inner.vertical = 5
outer.left = 3
outer.bottom = 3
outer.top = 3
outer.right = 3

# ──────────────────────────────────────────────
# Main mode
# ──────────────────────────────────────────────
[mode.main.binding]

# Launch terminal — sway: $super+Return exec ghostty
alt-enter = 'exec-and-forget open -na Ghostty'

# Close window — sway: $super+Shift+q kill
alt-shift-q = 'close'

# ──── Focus (sway: $super+arrows / hjkl) ────
alt-left = 'focus left'
alt-down = 'focus down'
alt-up = 'focus up'
alt-right = 'focus right'
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# ──── Move windows (sway: $super+Shift+arrows / hjkl) ────
alt-shift-left = 'move left'
alt-shift-down = 'move down'
alt-shift-up = 'move up'
alt-shift-right = 'move right'
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# ──── Split orientation (sway: $super+h splith / $super+v splitv) ────
# alt-h is used for focus, so using join-with for split behavior
alt-v = 'join-with down'
alt-backslash = 'join-with right'

# ──── Layout (sway: $super+z stacking / $super+x tabbed / $super+a toggle split) ────
alt-z = 'layout accordion horizontal'
alt-x = 'layout accordion vertical'
alt-a = 'layout tiles horizontal vertical'

# ──── Fullscreen (sway: $super+f) ────
alt-f = 'fullscreen'

# ──── Float toggle (sway: $super+Space floating toggle) ────
alt-space = 'layout floating tiling'

# ──── Focus mode toggle (sway: $super+tab focus mode_toggle) ────
alt-tab = 'focus-back-and-forth'

# ──── Workspace back_and_forth (sway: $super+slash) ────
alt-slash = 'focus-back-and-forth'

# ──── Workspaces (sway: $super+1-9) ────
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# ──── Move to workspace + focus (sway: $super+Shift+1-9) ────
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
alt-shift-9 = ['move-node-to-workspace 9', 'workspace 9']

# ──── Workspace cycling (sway: $super+Control+Right/Left) ────
alt-ctrl-right = 'workspace next'
alt-ctrl-left = 'workspace prev'

# ──── Move workspace to monitor ────
alt-shift-ctrl-left = 'move-workspace-to-monitor prev'
alt-shift-ctrl-right = 'move-workspace-to-monitor next'

# ──── Direct resize (sway: Shift+Ctrl+h/j/k/l) ────
ctrl-shift-h = 'resize width -50'
ctrl-shift-j = 'resize height +50'
ctrl-shift-k = 'resize height -50'
ctrl-shift-l = 'resize width +50'

# ──── Resize mode (sway: $super+r mode "resize") ────
alt-r = 'mode resize'

# ──── Reload config (sway: $super+Shift+r reload) ────
alt-shift-r = 'reload-config'

# ──── Flatten workspace tree (useful utility) ────
alt-shift-f = 'flatten-workspace-tree'

# ──────────────────────────────────────────────
# Resize mode (sway: mode "resize")
# ──────────────────────────────────────────────
[mode.resize.binding]
left = 'resize width -50'
down = 'resize height +50'
up = 'resize height -50'
right = 'resize width +50'
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'

# ──────────────────────────────────────────────
# Window rules (sway: for_window)
# ──────────────────────────────────────────────

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Preview'
run = 'layout floating'
